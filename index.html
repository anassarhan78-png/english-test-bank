<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الاختبارات - اللغة الإنجليزية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #2c3e6d;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .progress {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .question {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            line-height: 1.5;
        }
        .options {
            margin-bottom: 25px;
        }
        .option {
            display: block;
            margin: 12px 0;
            padding: 12px 15px;
            background: #eef2f5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .option:hover {
            background: #e0e7ed;
            transform: scale(1.01);
        }
        .option.selected {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }
        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border-right: 5px solid #28a745;
        }
        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border-right: 5px solid #dc3545;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-left: 10px;
            transition: 0.2s;
        }
        button:hover {
            background: #218838;
            transform: scale(1.02);
        }
        #next-btn {
            background: #007bff;
        }
        #next-btn:hover {
            background: #0056b3;
        }
        .result-box {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: #e9ecef;
            border-radius: 15px;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .question { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 بنك الاختبارات التفاعلي</h1>
    <div class="progress" id="progress"></div>
    <div id="quiz-container"></div>
    <div style="text-align: center; margin-top: 20px;">
        <button id="submit-btn">إرسال الإجابة ✅</button>
        <button id="next-btn" style="display:none;">السؤال التالي ➡️</button>
    </div>
    <div id="result"></div>
    <footer>كل سؤال يظهر شرحاً مفصلاً للإجابة الخاطئة لمساعدتك على التعلم</footer>
</div>

<script>
    let questions = [];
    let currentIndex = 0;
    let selectedAnswer = null;
    let quizContainer = document.getElementById('quiz-container');
    let submitBtn = document.getElementById('submit-btn');
    let nextBtn = document.getElementById('next-btn');
    let progressDiv = document.getElementById('progress');
    let resultDiv = document.getElementById('result');

    // تحميل الأسئلة من ملف JSON
    async function loadQuestions() {
        try {
            const response = await fetch('questions.json');
            if (!response.ok) throw new Error('لم يتم العثور على ملف questions.json');
            questions = await response.json();
            if (questions.length === 0) throw new Error('الملف فارغ');
            // التأكد من أن كل سؤال له حقل explanation (إذا لم يكن موجوداً نضيفه افتراضياً)
            questions.forEach((q, idx) => {
                if (!q.explanation) q.explanation = {};
                for (let opt of ['A','B','C','D']) {
                    if (!q.explanation[opt]) q.explanation[opt] = "تأمل الخيارات جيداً.";
                }
            });
            showQuestion();
        } catch (err) {
            quizContainer.innerHTML = `<div style="color:red; padding:20px;">⚠️ خطأ في تحميل الأسئلة: ${err.message}. تأكد من وجود ملف questions.json بصيغة صحيحة.</div>`;
            console.error(err);
        }
    }

    function showQuestion() {
        if (!questions.length || currentIndex >= questions.length) {
            finishQuiz();
            return;
        }
        const q = questions[currentIndex];
        progressDiv.innerText = `السؤال ${currentIndex+1} من ${questions.length}`;
        // عرض السؤال والخيارات
        let optionsHtml = '';
        const letters = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, idx) => {
            const letter = letters[idx];
            optionsHtml += `<div class="option" data-letter="${letter}">${letter}. ${opt}</div>`;
        });
        quizContainer.innerHTML = `
            <div class="question">${q.text}</div>
            <div class="options">${optionsHtml}</div>
            <div id="feedback"></div>
        `;
        // إضافة حدث النقر على الخيارات
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedAnswer = opt.getAttribute('data-letter');
            });
        });
        // إخفاء نتيجة سابقة
        resultDiv.innerHTML = '';
        submitBtn.style.display = 'inline-block';
        nextBtn.style.display = 'none';
        selectedAnswer = null;
    }

    function checkAnswer() {
        if (!selectedAnswer) {
            alert('الرجاء اختيار إجابة أولاً');
            return;
        }
        const q = questions[currentIndex];
        const isCorrect = (selectedAnswer === q.correct);
        const feedbackDiv = document.getElementById('feedback');
        const explanation = q.explanation[selectedAnswer] || "لا يوجد شرح تفصيلي لهذا الخيار.";
        const correctExplanation = q.explanation[q.correct] || `الإجابة الصحيحة هي ${q.correct}.`;
        
        if (isCorrect) {
            feedbackDiv.innerHTML = `<div class="feedback correct">✅ صحيح! ${explanation}</div>`;
        } else {
            feedbackDiv.innerHTML = `<div class="feedback wrong">❌ خطأ. إجابتك (${selectedAnswer}) غير صحيحة. ${explanation}<br><strong>✅ الصحيح: ${q.correct}</strong> — ${correctExplanation}</div>`;
        }
        submitBtn.style.display = 'none';
        nextBtn.style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < questions.length) {
            showQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        quizContainer.innerHTML = `<div class="result-box"><h2>🎉 تهانينا! 🎉</h2><p>لقد أكملت جميع الأسئلة (${questions.length} سؤالاً).</p><p>يمكنك تحديث الصفحة للبدء من جديد.</p></div>`;
        submitBtn.style.display = 'none';
        nextBtn.style.display = 'none';
        progressDiv.innerText = `انتهى الاختبار 🏁`;
        resultDiv.innerHTML = '';
    }

    submitBtn.addEventListener('click', checkAnswer);
    nextBtn.addEventListener('click', nextQuestion);

    loadQuestions();
</script>
</body>
</html>
