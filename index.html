<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الاختبارات - شامل + مفردات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        /* شريط التبويب */
        .tab-bar {
            display: flex;
            background: #f0f2f5;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            background: #f0f2f5;
            color: #2c3e6d;
        }
        .tab i {
            margin-left: 8px;
        }
        .tab.active {
            background: white;
            color: #007bff;
            border-bottom: 3px solid #007bff;
            border-radius: 20px 20px 0 0;
        }
        .content {
            padding: 25px;
        }
        h1 {
            text-align: center;
            color: #2c3e6d;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .progress {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .question {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            line-height: 1.5;
        }
        .options {
            margin-bottom: 25px;
        }
        .option {
            display: block;
            margin: 12px 0;
            padding: 12px 15px;
            background: #eef2f5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .option:hover {
            background: #e0e7ed;
            transform: scale(1.01);
        }
        .option.selected {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }
        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border-right: 5px solid #28a745;
        }
        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border-right: 5px solid #dc3545;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-left: 10px;
            transition: 0.2s;
        }
        button:hover {
            background: #218838;
            transform: scale(1.02);
        }
        #next-btn {
            background: #007bff;
        }
        #next-btn:hover {
            background: #0056b3;
        }
        .result-box {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: #e9ecef;
            border-radius: 15px;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
            padding-bottom: 20px;
        }
        @media (max-width: 600px) {
            .content { padding: 15px; }
            .question { font-size: 1.1rem; }
            .tab { font-size: 0.9rem; }
        }
    </style>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="tab-bar">
        <div class="tab active" data-mode="full"><i class="fas fa-database"></i> الاختبار الشامل</div>
        <div class="tab" data-mode="vocab"><i class="fas fa-book-open"></i> اختبار المفردات (معاني)</div>
    </div>
    <div class="content">
        <h1 id="mode-title"><i class="fas fa-graduation-cap"></i> بنك الأسئلة التفاعلي</h1>
        <div class="progress" id="progress"></div>
        <div id="quiz-container"></div>
        <div style="text-align: center; margin-top: 20px;">
            <button id="submit-btn">إرسال الإجابة ✅</button>
            <button id="next-btn" style="display:none;">السؤال التالي ➡️</button>
        </div>
        <div id="result"></div>
        <footer>✨ اختر الوضع المناسب: شامل (قواعد + قراءة + إملاء) أو مفردات فقط ✨</footer>
    </div>
</div>

<script>
    let questions = [];
    let currentMode = 'full'; // 'full' or 'vocab'
    let currentIndex = 0;
    let selectedAnswer = null;
    let quizContainer = document.getElementById('quiz-container');
    let submitBtn = document.getElementById('submit-btn');
    let nextBtn = document.getElementById('next-btn');
    let progressDiv = document.getElementById('progress');
    let resultDiv = document.getElementById('result');
    let modeTitle = document.getElementById('mode-title');

    async function loadQuestions() {
        const fileName = (currentMode === 'full') ? 'questions.json' : 'vocabulary.json';
        try {
            const response = await fetch(fileName);
            if (!response.ok) throw new Error(`الملف ${fileName} غير موجود`);
            questions = await response.json();
            if (questions.length === 0) throw new Error('الملف فارغ');
            // التأكد من وجود explanation لكل خيار
            questions.forEach((q, idx) => {
                if (!q.explanation) q.explanation = {};
                const letters = ['A','B','C','D'];
                letters.forEach(letter => {
                    if (!q.explanation[letter]) q.explanation[letter] = "تأمل الخيارات جيداً.";
                });
            });
            currentIndex = 0;
            selectedAnswer = null;
            updateTitle();
            showQuestion();
        } catch (err) {
            quizContainer.innerHTML = `<div style="color:red; padding:20px;">⚠️ خطأ في تحميل الأسئلة: ${err.message}. تأكد من وجود ملف ${fileName} بصيغة صحيحة.</div>`;
            console.error(err);
        }
    }

    function updateTitle() {
        if (currentMode === 'full') {
            modeTitle.innerHTML = '<i class="fas fa-database"></i> بنك الأسئلة الشامل';
            progressDiv.style.display = 'block';
        } else {
            modeTitle.innerHTML = '<i class="fas fa-book-open"></i> اختبار المفردات (معاني الكلمات)';
            progressDiv.style.display = 'block';
        }
    }

    function showQuestion() {
        if (!questions.length || currentIndex >= questions.length) {
            finishQuiz();
            return;
        }
        const q = questions[currentIndex];
        progressDiv.innerText = `السؤال ${currentIndex+1} من ${questions.length}`;
        let optionsHtml = '';
        const letters = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, idx) => {
            const letter = letters[idx];
            optionsHtml += `<div class="option" data-letter="${letter}">${letter}. ${opt}</div>`;
        });
        quizContainer.innerHTML = `
            <div class="question">${q.text}</div>
            <div class="options">${optionsHtml}</div>
            <div id="feedback"></div>
        `;
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedAnswer = opt.getAttribute('data-letter');
            });
        });
        resultDiv.innerHTML = '';
        submitBtn.style.display = 'inline-block';
        nextBtn.style.display = 'none';
        selectedAnswer = null;
    }

    function checkAnswer() {
        if (!selectedAnswer) {
            alert('الرجاء اختيار إجابة أولاً');
            return;
        }
        const q = questions[currentIndex];
        const isCorrect = (selectedAnswer === q.correct);
        const feedbackDiv = document.getElementById('feedback');
        const explanation = q.explanation[selectedAnswer] || "لا يوجد شرح تفصيلي.";
        const correctExplanation = q.explanation[q.correct] || `الإجابة الصحيحة هي ${q.correct}.`;
        
        if (isCorrect) {
            feedbackDiv.innerHTML = `<div class="feedback correct">✅ صحيح! ${explanation}</div>`;
        } else {
            feedbackDiv.innerHTML = `<div class="feedback wrong">❌ خطأ. إجابتك (${selectedAnswer}) غير صحيحة. ${explanation}<br><strong>✅ الصحيح: ${q.correct}</strong> — ${correctExplanation}</div>`;
        }
        submitBtn.style.display = 'none';
        nextBtn.style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < questions.length) {
            showQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        quizContainer.innerHTML = `<div class="result-box"><h2>🎉 تهانينا! 🎉</h2><p>لقد أكملت جميع الأسئلة (${questions.length} سؤالاً).</p><p>يمكنك تحديث الصفحة للبدء من جديد.</p></div>`;
        submitBtn.style.display = 'none';
        nextBtn.style.display = 'none';
        progressDiv.innerText = `انتهى الاختبار 🏁`;
        resultDiv.innerHTML = '';
    }

    // التبديل بين الوضعين
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const mode = tab.getAttribute('data-mode');
            if (mode === currentMode) return;
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            loadQuestions();
        });
    });

    submitBtn.addEventListener('click', checkAnswer);
    nextBtn.addEventListener('click', nextQuestion);

    // تحميل أولي
    loadQuestions();
</script>
</body>
</html>
